<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Dita Sayang ❤️ Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{overflow:hidden;color:#fff;background:#000}
.bg{position:fixed;inset:0;background:url('background.jpg') center/cover no-repeat;transform:scale(1.08)}
.bg:after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(8px)}
.progressWrap{position:fixed;top:0;left:0;width:100%;height:5px;background:rgba(255,255,255,.15);z-index:99}
.progress{height:100%;width:16%;background:linear-gradient(90deg,#ffd700,#fff3a0);transition:.8s}
.scene{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px}
.scene.active{display:flex;animation:fade .8s}
.card{max-width:700px;width:100%;background:rgba(255,255,255,.12);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.2);border-radius:28px;padding:32px;text-align:center;box-shadow:0 0 40px rgba(0,0,0,.4)}
h1,h2{margin-bottom:15px}
p{line-height:1.9}
.btn{margin-top:20px;padding:14px 28px;border:none;border-radius:40px;cursor:pointer;font-weight:600}
.gold{background:#ffd700}
.no{background:#ff4d6d;color:#fff;position:relative}
.envelope{font-size:80px;animation:float 2s infinite ease-in-out}
.type{min-height:120px}
.heart,.confetti{position:fixed;pointer-events:none}
@keyframes fade{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes float{50%{transform:translateY(-10px)}}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<audio autoplay loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<div class="bg"></div>
<div class="progressWrap"><div class="progress" id="bar"></div></div>

<div class="scene active"><div class="card">
<div class="envelope">💌</div>
<h1>Untuk Dita</h1>
<p>Klik surat ini untuk membuka sebuah pesan rahasia.</p>
<button class="btn gold" onclick="next()">Buka Surat</button>
</div></div>

<div class="scene"><div class="card">
<h2>✨ Hai Dita</h2>
<p class="type" data-text="Terima kasih sudah hadir dan menjadi bagian terindah dalam hidupku."></p>
<button class="btn gold" onclick="next()">Lanjut</button>
</div></div>

<div class="scene"><div class="card">
<h2>🌈 Perjalanan Kita</h2>
<p class="type" data-text="Setiap langkah bersamamu terasa seperti berjalan di terowongan cahaya yang penuh warna dan harapan."></p>
<button class="btn gold" onclick="next()">Lanjut</button>
</div></div>

<div class="scene"><div class="card">
<h2>💭 Sebuah Harapan</h2>
<p class="type" data-text="Aku ingin menciptakan lebih banyak cerita, tawa, dan kenangan bersamamu."></p>
<button class="btn gold" onclick="next()">Lanjut</button>
</div></div>

<div class="scene"><div class="card">
<h2>❤️ Pertanyaan Penting</h2>
<p>Dita Ameliya, bagaimana untuk kencan hari ini?</p>
<button class="btn gold" onclick="acceptDate()">❤️ Sangat Puas</button>
<button class="btn no" id="noBtn">😅 Tidak Puas</button>
</div></div>

<div class="scene"><div class="card">
<h2>🎉 Yeay!</h2>
<p>Aku sangat bahagia ❤️<br>Mengirimmu ke WhatsApp...</p>
</div></div>

<script>
const scenes=document.querySelectorAll('.scene');
let current=0;

function runTyping(){
 document.querySelectorAll('.type').forEach(el=>{
  if(el.dataset.done) return;
  el.dataset.done=1;
  let t=el.dataset.text,i=0;
  let inter=setInterval(()=>{
   el.innerHTML+=t[i]||''; i++;
   if(i>t.length) clearInterval(inter);
  },30);
 });
}
runTyping();

function next(){
 scenes[current].classList.remove('active');
 current++;
 scenes[current].classList.add('active');
 document.getElementById('bar').style.width=((current+1)/6*100)+'%';
 runTyping();
}

const noBtn=document.getElementById('noBtn');
noBtn.addEventListener('mouseover',()=>{
 noBtn.style.transform=`translate(${Math.random()*300-150}px,${Math.random()*200-100}px)`;
});

function rain(symbol,count){
 for(let i=0;i<count;i++){
  const e=document.createElement('div');
  e.className=symbol==='❤️'?'heart':'confetti';
  e.innerHTML=symbol;
  e.style.left=Math.random()*100+'vw';
  e.style.top='-20px';
  e.style.fontSize=(15+Math.random()*20)+'px';
  e.style.animation=`fall ${2+Math.random()*3}s linear forwards`;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),5000);
 }
}

function acceptDate(){
 next();
 rain('❤️',40);
 rain('🎊',40);
 setTimeout(()=>{
   const msg=encodeURIComponent("Hai Ayang ❤️\n\nUntuk kencan hari ini 🥰\n\nAku sangat senang sekali💕\n\nSampai bertemu di lain waktu😘");
   window.open("https://wa.me/6285974891363?text="+msg,"_blank");
 },2500);
}
</script>
</body>
</html>
